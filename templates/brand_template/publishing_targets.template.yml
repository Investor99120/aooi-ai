schema_version: 1
template_type: publishing_targets
template_status: generic

brand: "{{BRAND_NAME}}"

targets:
  - platform: shopify
    adapter: adapters/shopify
    output_format:
      - markdown
      - json
      - jsonld
      - theme_notes
    output_location: "outputs/{{BRAND_ID}}/shopify"
    manual_review_required: true
    auto_publish_allowed: false
  - platform: wordpress
    adapter: adapters/wordpress
    output_format:
      - markdown
      - html
      - jsonld
    output_location: "outputs/{{BRAND_ID}}/wordpress"
    manual_review_required: true
    auto_publish_allowed: false
  - platform: webflow
    adapter: adapters/webflow
    output_format:
      - markdown
      - html
      - jsonld
    output_location: "outputs/{{BRAND_ID}}/webflow"
    manual_review_required: true
    auto_publish_allowed: false
  - platform: static_export
    adapter: adapters/static_export
    output_format:
      - markdown
      - html
      - json
      - jsonld
    output_location: "outputs/{{BRAND_ID}}/static_export"
    manual_review_required: true
    auto_publish_allowed: false

global_publication_rules:
  - Do not auto-publish in Phase 1 or Phase 2.
  - Do not publish unreviewed claim-sensitive content.
  - Do not publish unverified product facts.
  - Do not publish fake reviews or invented evidence.
  - Publishing adapters must not own core brand intelligence.
