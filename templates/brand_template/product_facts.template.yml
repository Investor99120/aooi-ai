schema_version: 1
template_type: product_facts
template_status: generic

brand: "{{BRAND_NAME}}"
source_status: needs_owner_confirmation
last_updated: "{{YYYY-MM-DD}}"

source_of_truth_notice:
  rule: This file is the product facts source of truth for the brand. Do not publish or generate customer-facing claims from unverified fields.
  no_invented_specs: true
  owner_confirmation_required_before_publication: true
  unverified_statuses:
    - unverified
    - needs_owner_confirmation
  placeholder_values:
    - TBC
    - unknown

verified_product_facts:
  brand_position:
    value: "{{VERIFIED_BRAND_POSITION_IF_CONFIRMED}}"
    source_status: "{{verified|owner_defined|needs_owner_confirmation}}"
    schema_ready: false
  product_category:
    value: "{{PRODUCT_CATEGORY}}"
    source_status: "{{verified|owner_defined|needs_owner_confirmation}}"
    schema_ready: true
  currency:
    value: "{{CURRENCY_CODE}}"
    source_status: "{{verified|inferred_from_market|needs_owner_confirmation}}"
    schema_ready: true

unverified_fields:
  product_name:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false
  product_url:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false
  specifications:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false
  dimensions:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false
  weight:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false
  certifications:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false
  delivery_timeline:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false
  returns_window:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false
  warranty_length:
    value: TBC
    source_status: needs_owner_confirmation
    schema_ready: false

owner_confirmation_required:
  - final product names
  - final product URLs
  - technical specifications
  - dimensions and weight
  - certifications
  - delivery timeline and cost
  - returns window and conditions
  - warranty length and coverage
  - usage guidance from product manual

product_catalog:
  - product_id: "{{PRODUCT_ID}}"
    product_name: "{{PRODUCT_NAME_OR_TBC}}"
    source_status: needs_owner_confirmation
    product_url: TBC
    status_notes: Confirm before publication.
    schema_ready: false

usage_contexts:
  source_status: "{{owner_defined|needs_owner_confirmation}}"
  values:
    - "{{USAGE_CONTEXT_1}}"
    - "{{USAGE_CONTEXT_2}}"

conversion_contexts:
  allowed_link_language:
    - "{{CTA_TEXT_1}}"
    - "{{CTA_TEXT_2}}"
  disallowed:
    - naked product URLs in customer-facing copy
    - fake discounts
    - unverified delivery promises
    - unverified warranty promises

schema_ready_fields:
  Organization:
    name:
      value: "{{BRAND_NAME}}"
      source_status: owner_defined
    url:
      value: "{{BRAND_DOMAIN}}"
      source_status: owner_defined
  Brand:
    name:
      value: "{{BRAND_NAME}}"
      source_status: owner_defined
  Product:
    name:
      value: TBC
      source_status: needs_owner_confirmation
      schema_ready: false
    category:
      value: "{{PRODUCT_CATEGORY}}"
      source_status: "{{owner_defined|verified|needs_owner_confirmation}}"
      schema_ready: true
    description:
      value: TBC
      source_status: needs_owner_confirmation
      schema_ready: false
  OfferShippingDetails:
    shipping_destination:
      value: "{{COUNTRY_CODE}}"
      source_status: "{{verified|inferred_from_market|needs_owner_confirmation}}"
      schema_ready: true
    delivery_time:
      value: TBC
      source_status: needs_owner_confirmation
      schema_ready: false
  MerchantReturnPolicy:
    applicable_country:
      value: "{{COUNTRY_CODE}}"
      source_status: "{{verified|inferred_from_market|needs_owner_confirmation}}"
      schema_ready: true
    return_window:
      value: TBC
      source_status: needs_owner_confirmation
      schema_ready: false

delivery_policy:
  value: TBC
  source_status: needs_owner_confirmation
  schema_ready: false

returns_policy:
  value: TBC
  source_status: needs_owner_confirmation
  schema_ready: false

warranty_policy:
  value: TBC
  source_status: needs_owner_confirmation
  schema_ready: false

trust_notes:
  - Delivery, returns, warranty and product guidance are trust-critical, but must be owner-confirmed before publication.
  - Do not use fake reviews, fake social proof, or invented customer testimonials.
  - Product facts should be transparent even when incomplete.

compliance_notes:
  medical_claims_allowed: false
  fake_reviews_allowed: false
  invented_specifications_allowed: false
  automatic_publish_allowed: false
  customer_facing_copy_requires:
    - source-status check
    - claim blacklist scan
    - localisation check
    - owner confirmation for product specifications
