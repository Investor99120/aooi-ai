schema_version: 1
template_type: faq_bank
template_status: generic

brand_id: "{{BRAND_ID}}"
source_status: template_only
publishing_mode: review_mode
auto_publish_allowed: false
manual_review_required: true

faqs:
  - id: "{{FAQ_ID}}"
    question: "{{QUESTION}}"
    answer_draft: "{{ANSWER_DRAFT}}"
    intent_cluster: "{{INTENT_CLUSTER}}"
    emotional_cluster: "{{EMOTIONAL_CLUSTER}}"
    trust_objection: "{{TRUST_OBJECTION}}"
    funnel_stage: "{{TOFU|MOFU|BOFU|SUPPORT}}"
    claim_risk_level: "{{low|medium|high}}"
    source_status: "{{verified|owner_defined|unverified|needs_owner_confirmation|needs_research}}"
    source_notes: "{{SOURCE_NOTES}}"
    schema_eligible: "{{candidate|false}}"
    shopify_block_eligible: "{{candidate|false}}"
    requires_claim_validator: true
    requires_source_status_validator: true
    manual_review_required: true
    publishing_mode: review_mode
    decision: "{{draft_candidate|needs_review|blocked|approved_for_draft|approved_for_export}}"
    last_reviewed_at: null
    owner_notes: "{{OWNER_NOTES}}"

schema_rules:
  FAQPage_schema_generated_in_current_phase: false
  FAQPage_eligible_after:
    - claim_validator_pass
    - source_status_validator_pass
    - manual_review_complete
    - publishing_safety_policy_allows_export

shopify_rules:
  shopify_block_generated_in_current_phase: false
  future_output_directory: "outputs/{{BRAND_ID}}/shopify/"
  auto_publish_allowed: false
  manual_review_required: true
