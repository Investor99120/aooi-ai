schema_version: 1

review_mode:
  purpose: owner_review_only
  bilingual_review_allowed: true
  customer_facing: false
  requires_validation: false
  allowed_outputs:
    - internal_review_notes
    - bilingual_review_copy
    - risk_reports
    - owner_confirmation_checklists
  blocked_outputs:
    - final_customer_facing_copy
    - final_shopify_content
    - live_storefront_publication

export_mode:
  purpose: clean_target_market_language_output_for_manual_export
  bilingual_review_allowed: false
  customer_facing: true
  requires_validation: true
  requires_claim_validator: true
  requires_source_status_validator: true
  allowed_outputs:
    - clean_copy_for_manual_review
    - manual_copy_paste_files
    - adapter_output_preview_after_validation
  blocked_outputs:
    - chinese_review_notes_in_final_export
    - unverified_claims
    - unreviewed_health_or_wellness_claims
    - automatic_publication

draft_creation_mode:
  purpose: future_unpublished_draft_creation_after_validation
  implemented: false
  customer_facing: false
  requires_validation: true
  requires_manual_review: true
  allowed_platforms:
    - shopify
    - wordpress
    - webflow
    - static_export
  blocked_content_types:
    - unvalidated_outputs
    - blocked_claims
    - unverified_product_facts
    - needs_owner_confirmation_fields
    - live_publication

auto_publish_mode:
  enabled_by_default: false
  implemented: false
  allowed: false
  blocked_content_types:
    - health_or_wellness_claims
    - product_benefit_claims
    - product_specifications
    - delivery_timelines
    - warranty_promises
    - certification_claims
    - customer_reviews
    - trustpilot_reddit_youtube_tiktok_proof
    - competitor_comparison_pages
    - medical_adjacent_content
    - product_schema
    - faqpage_schema
    - howto_schema
    - offer_shipping_details_schema
    - merchant_return_policy_schema
  requires_owner_approval: true
  notes:
    - auto_publish_may_only_be_considered_in_future_for_low_risk_verified_non_claim_content
    - adapter_level_safeguards_required_before_any_future_enablement

decision_values:
  - pass
  - needs_review
  - blocked

default_policy:
  auto_publish_allowed: false
  manual_review_required: true
  draft_creation_allowed: only_after_validation_passes
  final_publish_requires_human_approval: true
  blocked_when_uncertain: true
