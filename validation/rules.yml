schema_version: 1
default_decision: blocked_when_uncertain

required_files:
  decision_on_missing: blocked
  files:
    - brand_profile.yml
    - product_facts.yml
    - claim_whitelist.md
    - claim_blacklist.md
    - localisation_rules.md
    - semantic_map.yml
    - search_intent_map.yml
    - content_cluster_map.yml
    - faq_bank.yml
    - publishing_targets.yml

placeholder_patterns:
  decision_on_match: blocked
  patterns:
    - "{{BRAND_NAME}}"
    - "{{BRAND_DOMAIN}}"
    - "{{PRIMARY_MARKET}}"
    - "{{PRODUCT_CATEGORY}}"
    - "{{PLATFORM}}"
    - "{{.*}}"

source_status_rules:
  decision_on_missing_source_status: needs_review
  allowed_statuses:
    - verified
    - owner_defined
    - unverified
    - needs_owner_confirmation
    - needs_research
  customer_facing_allowed_statuses:
    - verified
    - owner_defined
  customer_facing_blocked_statuses:
    - unverified
    - needs_owner_confirmation
    - needs_research
  schema_ready_required_status:
    - verified
  output_status_inheritance: most_restrictive

product_fact_rules:
  decision_on_missing_product_fact_source_status: blocked
  block_if:
    - product_specs_without_source_status
    - logistics_without_confirmation
    - certifications_without_proof
    - warranty_promises_without_confirmation
    - delivery_timelines_without_confirmation
    - reviews_without_source_proof
    - schema_ready_unverified_fields

claim_risk_rules:
  decision_on_high_risk_claim: blocked
  scan_sources:
    - claim_blacklist.md
    - generated_outputs
    - faq_bank.yml
    - product_facts.yml
  block_if:
    - blacklist_term_found_in_customer_facing_output
    - medicalised_claim_found
    - guaranteed_result_claim_found
    - fake_trust_signal_found
    - invented_authority_endorsement_found

publishing_target_rules:
  supported_platforms:
    - shopify
    - wordpress
    - webflow
    - static_export
    - custom
  auto_publish_allowed_default: false
  decision_if_auto_publish_true: blocked
  manual_review_required_default: true
  decision_if_manual_review_required_false: blocked
  adapter_auto_publish_allowed_in_early_phases: false

manual_review_rules:
  manual_review_completed_required_for_pass: true
  decision_if_manual_review_missing: blocked
  decision_if_manual_review_incomplete: needs_review
  required_review_areas:
    - required_files
    - placeholders
    - source_status
    - product_facts
    - claim_risk
    - publishing_targets
    - localisation
    - fake_reviews

decision_values:
  - pass
  - needs_review
  - blocked
