schema_version: 1
brand: FriendRedLight
semantic_goal: Trusted UK-focused home red light therapy wellness brand
source_status: owner_defined_strategy

core_entities:
  - FriendRedLight
  - UK red light therapy brand
  - home wellness
  - red light therapy
  - near-infrared light
  - at-home self-care
  - evening recovery routine

product_entities:
  - name: full-body red light therapy mat
    source_status: needs_owner_confirmation
    notes: Product entity requested for semantic planning only. Do not publish product facts until confirmed.
  - name: 7-wavelength red light therapy device
    source_status: needs_owner_confirmation
    notes: Wavelength count must be owner-confirmed before publication.
  - name: mini red light therapy panel
    source_status: needs_owner_confirmation
    notes: Product entity requires owner confirmation before publication.
  - name: red and near-infrared light device
    source_status: needs_owner_confirmation
    notes: Generic product entity; exact product facts require owner confirmation.

audience_entities:
  - UK home wellness customers
  - people building evening routines
  - screen-heavy workers
  - wellness-conscious households
  - people seeking calm self-care routines

emotional_clusters:
  - tired after work
  - screen fatigue
  - winter low energy
  - evening decompression
  - desire for calm
  - desire for consistency
  - home comfort
  - trust and safety concerns

intent_clusters:
  informational:
    - what is red light therapy
    - red light therapy safety
    - 660nm vs 850nm
    - how often to use red light therapy
    - how long should a session be
  lifestyle:
    - red light before bed
    - evening recovery routine
    - red light therapy at home UK
  commercial:
    - best red light therapy device UK
    - home red light therapy device
    - red light therapy panel UK

trust_clusters:
  UK_delivery:
    source_status: needs_owner_confirmation
  returns:
    label: 30-day returns
    source_status: needs_owner_confirmation
    notes: Do not publish as fact unless confirmed by owner.
  warranty:
    label: 1-year warranty
    source_status: needs_owner_confirmation
    notes: Do not publish as fact unless confirmed by owner.
  UK_plug_included:
    source_status: needs_owner_confirmation
  clear_usage_guidance:
    source_status: conservative_placeholder
  transparent_product_facts:
    source_status: owner_defined
  non_medical_wellness_positioning:
    source_status: owner_defined

content_clusters:
  educational_guides:
    purpose: Explain red light therapy and category basics without medical overclaiming.
  FAQ_centre:
    purpose: Answer safety, usage, product, delivery, returns, warranty and trust questions.
  evening_routine_content:
    purpose: Connect the brand to calm UK evening routines.
  winter_wellness_content:
    purpose: Connect the brand to darker UK evenings and home self-care.
  product_comparison_content:
    purpose: Support product evaluation once product facts are verified.
  safety_and_usage_content:
    purpose: Provide conservative product manual-led guidance.
  product_page_support_content:
    purpose: Support conversion with verified product facts and natural internal links.

internal_link_clusters:
  FAQ_to_guides:
    - FAQ centre links to educational guides and safety pages.
  guides_to_product_pages:
    - Guides link to product pages only through natural conversion contexts.
  routine_pages_to_product_pages:
    - Routine pages link to relevant product pages after explaining use context.
  comparison_pages_to_FAQ_and_product_pages:
    - Comparison pages link to FAQ, product facts, and product pages.
  product_pages_to_usage_guidance:
    - Product pages link to clear usage guidance and safety notes.

schema_entity_map:
  - Organization
  - Brand
  - WebSite
  - Product
  - FAQPage
  - BreadcrumbList
  - Article
  - HowTo where appropriate
  - OfferShippingDetails where appropriate
  - MerchantReturnPolicy where appropriate

content_to_conversion_paths:
  red_light_before_bed:
    human_reason:
      - wants to relax
      - wants a bedtime habit
      - worries about safety
      - needs usage duration guidance
      - needs non-medical but credible explanation
    path:
      - educational guide
      - safety FAQ
      - evening routine content
      - product page support content
  best_red_light_therapy_device_UK:
    human_reason:
      - wants comparison
      - wants trust signals
      - wants UK delivery and returns clarity
      - wants verified product facts
    path:
      - comparison brief
      - product facts
      - FAQ centre
      - product page support content

compliance_notes:
  medical_claims_allowed: false
  fake_reviews_allowed: false
  publish_unverified_specs: false
  automatic_shopify_publish_allowed: false
  required_review_before_adapter_export:
    - claim blacklist scan
    - product facts verification
    - UK English check
    - fake social proof check
    - source-status check

reusable_brand_framework_notes:
  - This semantic map is the first case implementation.
  - Future brands must use the same structure under brands/{brand}/.
  - Engines and adapters must read from brand configuration files.
  - Do not hard-code FriendRedLight into reusable logic.
